<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ede4d2">
<title>termo — print to your MX10</title>
<meta name="description" content="A free site that prints text, images, and QR codes to your MX10 (or cat-printer compatible) thermal printer straight from the browser. No accounts, no ads.">
<meta property="og:title" content="termo — print to your MX10">
<meta property="og:description" content="Print to your thermal printer from the browser. Over Bluetooth. No accounts, no ads.">

<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Geist:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@10..48,400..800&family=Caveat:wght@400..700&family=Special+Elite&family=Press+Start+2P&family=VT323&family=Pacifico&family=Bungee&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --paper: #ede4d0;
    --paper-2: #e4d9c0;
    --paper-warm: #f4ecd9;
    --card: #fbf6e9;
    --receipt: #fdfaf2;
    --ink: #1a140c;
    --ink-2: #2a2218;
    --ink-soft: #4a3d2a;
    --muted: #8a7c64;
    --rule: #c8baa0;
    --rule-soft: #d9cdb4;
    --stamp: #b8412a;
    --stamp-ink: #8e2e1a;
    --ok: #587a39;
    --ok-glow: #7fa84e;
    --err: #b8412a;
    --font-serif: "Newsreader", "Source Serif Pro", Georgia, serif;
    --font-sans: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at 80% -10%, rgba(255,250,230,0.7), transparent 50%),
      radial-gradient(ellipse at 10% 110%, rgba(180,150,100,0.12), transparent 50%);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.5;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    position: relative;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4  0 0 0 0 0.35  0 0 0 0 0.25  0 0 0 0.35 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.35;
    mix-blend-mode: multiply;
    pointer-events: none;
    z-index: 0;
  }
  main, header, footer { position: relative; z-index: 1; }

  /* ---------- frame: target single-screen fit on ≥720h ---------- */
  .frame {
    max-width: 1240px;
    margin: 0 auto;
    padding: 18px 28px 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ---------- header ---------- */
  .head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 10px;
    border-bottom: 1.5px solid var(--ink);
  }
  .brand {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 500;
    font-size: 30px;
    letter-spacing: -0.025em;
    line-height: 1;
    color: var(--ink);
    display: inline-flex;
    align-items: baseline;
  }
  .brand .dotaccent {
    width: 7px;
    height: 7px;
    background: var(--stamp);
    border-radius: 50%;
    display: inline-block;
    margin-left: 3px;
    align-self: center;
    transform: translateY(2px);
  }

  /* ---------- main layout ---------- */
  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
    gap: 44px;
    flex: 1;
    min-height: 0;
    align-items: stretch;
  }

  /* ---------- controls column ---------- */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 0;
    min-height: 0;
  }

  .tabs {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--rule);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs button {
    background: none;
    border: none;
    padding: 9px 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    cursor: pointer;
    position: relative;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-weight: 500;
    transition: color 0.12s;
    white-space: nowrap;
  }
  .tabs button:hover { color: var(--ink-soft); }
  .tabs button.active {
    color: var(--ink);
    border-bottom-color: var(--stamp);
  }

  .panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
    flex: 1;
  }

  .field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .field-label {
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    font-weight: 500;
    display: inline-flex;
    align-items: center;
  }

  input[type=text], select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 7px;
    padding: 10px 13px;
    font-size: 14.5px;
    font-family: var(--font-sans);
    color: var(--ink);
    outline: none;
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  input[type=text]:focus, select:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(26,20,12,0.06);
  }
  ::placeholder { color: var(--muted); opacity: 0.7; }

  /* --- contenteditable text editor --- */
  .text-editor-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .text-editor-head > .field-label {
    white-space: nowrap;
    flex-shrink: 0;
  }
  .text-toolbar {
    display: inline-flex;
    align-items: center;
    gap: 1px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 7px;
    padding: 2px;
  }
  .tb-btn {
    background: none;
    border: none;
    width: 26px;
    height: 26px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 13px;
    line-height: 1;
    transition: background 0.1s, color 0.1s;
    padding: 0;
  }
  .tb-btn:hover { background: var(--paper-warm); color: var(--ink); }
  .tb-btn.active {
    background: var(--ink);
    color: var(--paper-warm);
  }
  .tb-btn b, .tb-btn i, .tb-btn u { font-size: 13px; }
  .tb-sep {
    width: 1px;
    height: 16px;
    background: var(--rule);
    margin: 0 3px;
  }
  .text-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14.5px;
    line-height: 1.5;
    font-family: var(--font-mono);
    color: var(--ink);
    outline: none;
    transition: border-color 0.12s, box-shadow 0.12s;
    flex: 1;
    min-height: 140px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .text-input:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(26,20,12,0.06);
  }
  .text-input:empty::before {
    content: attr(data-placeholder);
    color: var(--muted);
    opacity: 0.7;
    pointer-events: none;
  }
  .text-input b, .text-input strong { font-weight: 700; }
  .text-input i, .text-input em { font-style: italic; }
  .text-input u { text-decoration: underline; }

  /* hint tooltip */
  .hint {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    border: 1px solid var(--muted);
    border-radius: 50%;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-sans);
    font-size: 9.5px;
    font-weight: 600;
    cursor: help;
    position: relative;
    margin-left: 6px;
    padding: 0;
    line-height: 1;
    transition: color 0.1s, border-color 0.1s, background 0.1s;
  }
  .hint:hover, .hint:focus-visible {
    color: var(--paper-warm);
    background: var(--ink);
    border-color: var(--ink);
    outline: none;
  }
  .hint[data-tooltip]:hover::after,
  .hint[data-tooltip]:focus::after {
    content: attr(data-tooltip);
    position: absolute;
    left: 50%;
    bottom: calc(100% + 8px);
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--paper-warm);
    font-family: var(--font-sans);
    font-size: 12.5px;
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
    padding: 9px 12px;
    border-radius: 6px;
    white-space: normal;
    width: max-content;
    max-width: 240px;
    line-height: 1.4;
    z-index: 100;
    pointer-events: none;
    box-shadow: 0 6px 16px rgba(0,0,0,0.22);
  }
  .hint[data-tooltip]:hover::before,
  .hint[data-tooltip]:focus::before {
    content: '';
    position: absolute;
    left: 50%;
    bottom: calc(100% + 2px);
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--ink);
    z-index: 100;
  }

  select {
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%231a140c' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 32px;
  }

  .row { display: flex; gap: 12px; }
  .row > * { flex: 1; min-width: 0; }

  /* segmented control (inline orientation switch) */
  .seg {
    display: inline-flex;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 7px;
    padding: 2px;
    gap: 1px;
  }
  .seg button {
    background: none;
    border: none;
    padding: 6px 11px;
    font-size: 12px;
    border-radius: 5px;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: var(--font-sans);
    font-weight: 500;
    transition: background 0.1s, color 0.1s;
    white-space: nowrap;
  }
  .seg button:hover { color: var(--ink); }
  .seg button.active {
    background: var(--ink);
    color: var(--paper-warm);
  }

  /* image dropzone */
  .dropzone {
    border: 1.5px dashed var(--rule);
    border-radius: 10px;
    padding: 22px 20px;
    text-align: center;
    background: var(--card);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--ink);
    background: var(--paper-warm);
  }
  .dropzone-icon {
    font-family: var(--font-mono);
    font-size: 22px;
    color: var(--ink-soft);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  .dropzone-text {
    font-size: 14px;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .dropzone-hint {
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-top: 5px;
  }
  .dropzone input { display: none; }
  .dropzone .filename {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink);
    margin-top: 8px;
    word-break: break-all;
  }

  /* big print button */
  .print-btn {
    width: 100%;
    padding: 15px 24px;
    background: var(--stamp);
    color: #fff8ee;
    border: 2px solid var(--stamp-ink);
    border-radius: 5px;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--stamp-ink), 0 8px 16px rgba(142,46,26,0.18);
    transition: transform 0.07s ease-out, box-shadow 0.07s ease-out, background 0.15s;
    position: relative;
    text-shadow: 0 1px 0 rgba(0,0,0,0.12);
  }
  .print-btn:hover:not(:disabled) { background: #c34a32; }
  .print-btn:active:not(:disabled) {
    transform: translateY(3px);
    box-shadow: 0 1px 0 var(--stamp-ink), 0 2px 4px rgba(142,46,26,0.2);
  }
  .print-btn:disabled {
    background: #b5a890;
    border-color: #8e8270;
    box-shadow: 0 4px 0 #8e8270;
    color: rgba(255,255,255,0.85);
    cursor: not-allowed;
  }
  .print-btn .arrow { display: inline-block; margin-left: 8px; transform: translateY(-1px); }

  /* settings — compact inline row at bottom of left col */
  .settings {
    padding-top: 12px;
    border-top: 1px dashed var(--rule);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .settings-row {
    display: flex;
    gap: 18px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .settings-row > .field { min-width: 130px; }
  .settings-row > .field.grow { flex: 1; min-width: 140px; }

  .slider-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    gap: 12px;
    margin-bottom: 4px;
  }
  .slider-head .label { color: var(--muted); display: inline-flex; align-items: center; white-space: nowrap; }
  .slider-head .value { color: var(--ink); }
  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    cursor: pointer;
    margin: 0;
    height: 18px;
  }
  input[type=range]::-webkit-slider-runnable-track { height: 3px; background: var(--rule); border-radius: 2px; }
  input[type=range]::-moz-range-track { height: 3px; background: var(--rule); border-radius: 2px; }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    background: var(--ink);
    border-radius: 50%;
    margin-top: -6.5px;
    border: 2.5px solid var(--paper-warm);
    box-shadow: 0 0 0 1px var(--ink);
  }
  input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px;
    background: var(--ink);
    border-radius: 50%;
    border: 2.5px solid var(--paper-warm);
    box-shadow: 0 0 0 1px var(--ink);
  }

  .sec-btn {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
    border-radius: 5px;
    padding: 9px 14px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    cursor: pointer;
    transition: all 0.12s;
    font-weight: 500;
    white-space: nowrap;
  }
  .sec-btn:hover:not(:disabled) { background: var(--ink); color: var(--paper-warm); }
  .sec-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ---------- toast ---------- */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%) translateY(16px);
    background: var(--ink);
    color: var(--paper-warm);
    padding: 11px 18px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    letter-spacing: 0.02em;
    line-height: 1.3;
    box-shadow: 0 10px 30px rgba(0,0,0,0.28), 0 2px 6px rgba(0,0,0,0.18);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    max-width: calc(100vw - 32px);
    cursor: pointer;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
  .toast.ok  { background: #2d4f1f; color: #e8f0d8; }
  .toast.err { background: var(--stamp); color: #fff8ee; }
  .toast-icon { width: 14px; height: 14px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; }
  .toast-icon::before {
    content: ""; display: block;
    width: 8px; height: 8px; border-radius: 50%;
    background: currentColor; opacity: 0.85;
    animation: toast-pulse 1.2s ease-in-out infinite;
  }
  .toast.ok .toast-icon::before, .toast.err .toast-icon::before { animation: none; opacity: 1; background: none; background-color: currentColor; width: 13px; height: 13px; }
  .toast.ok .toast-icon::before {
    mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M3 8.5l3.2 3.2L13 4.8' stroke='black' stroke-width='2.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") center/contain no-repeat;
    -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M3 8.5l3.2 3.2L13 4.8' stroke='black' stroke-width='2.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") center/contain no-repeat;
  }
  .toast.err .toast-icon::before {
    mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='7' stroke='black' stroke-width='1.6' fill='none'/><path d='M8 4.5v4.2M8 11v0.6' stroke='black' stroke-width='1.8' stroke-linecap='round'/></svg>") center/contain no-repeat;
    -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='7' stroke='black' stroke-width='1.6' fill='none'/><path d='M8 4.5v4.2M8 11v0.6' stroke='black' stroke-width='1.8' stroke-linecap='round'/></svg>") center/contain no-repeat;
  }
  @keyframes toast-pulse {
    0%, 100% { opacity: 0.4; transform: scale(0.85); }
    50%      { opacity: 1;   transform: scale(1); }
  }

  /* ---------- right column (printer + receipt) ---------- */
  .receipt-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 0;
  }

  /* PRINTER PANEL — clickable "control display" above the printer mouth.
     This is the unified connect/disconnect control + device status.    */
  .printer-panel {
    width: 100%;
    max-width: 360px;
    background: linear-gradient(180deg, var(--ink) 0%, var(--ink-2) 100%);
    color: var(--paper-warm);
    border: none;
    border-radius: 10px 10px 4px 4px;
    padding: 11px 14px 13px;
    text-align: left;
    cursor: pointer;
    box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 -1px 0 rgba(0,0,0,0.4) inset, 0 4px 14px rgba(30,20,10,0.18);
    transition: transform 0.08s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--font-mono);
    position: relative;
    z-index: 3;
  }
  .printer-panel:hover { box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset, 0 -1px 0 rgba(0,0,0,0.4) inset, 0 6px 18px rgba(30,20,10,0.24); }
  .printer-panel:active { transform: translateY(1px); }
  .printer-panel:disabled { cursor: not-allowed; opacity: 0.7; }

  /* LED status light on the left */
  .pp-led {
    flex-shrink: 0;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #6a5544;
    box-shadow: 0 0 0 0 transparent, inset 0 1px 1px rgba(0,0,0,0.4);
    transition: background 0.25s, box-shadow 0.25s;
  }
  .printer-panel.ok .pp-led {
    background: var(--ok-glow);
    box-shadow: 0 0 8px rgba(127,168,78,0.7), 0 0 14px rgba(127,168,78,0.35), inset 0 1px 1px rgba(0,0,0,0.2);
  }
  .printer-panel.busy .pp-led {
    background: #d99836;
    box-shadow: 0 0 8px rgba(217,152,54,0.65), inset 0 1px 1px rgba(0,0,0,0.2);
    animation: led-blink 0.9s ease-in-out infinite;
  }
  .printer-panel.err .pp-led {
    background: var(--stamp);
    box-shadow: 0 0 8px rgba(184,65,42,0.7), inset 0 1px 1px rgba(0,0,0,0.2);
  }
  .printer-panel.warn .pp-led {
    background: #d99836;
    box-shadow: 0 0 6px rgba(217,152,54,0.55), inset 0 1px 1px rgba(0,0,0,0.2);
  }
  @keyframes led-blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }

  /* Text block */
  .pp-text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .pp-name {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--paper-warm);
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pp-meta {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #b3a48a;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .printer-panel.warn .pp-meta,
  .printer-panel.err .pp-meta { color: #f1c598; }
  .printer-panel.ok .pp-meta { color: #a7b88a; }

  /* Battery glyph */
  .pp-battery {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 0.04em;
    color: var(--paper-warm);
  }
  .pp-battery.hide { display: none; }
  .battery {
    position: relative;
    width: 22px; height: 11px;
    border: 1.3px solid var(--paper-warm);
    border-radius: 2.5px;
    padding: 1.2px;
  }
  .battery::after {
    content: "";
    position: absolute;
    right: -3.5px; top: 2.5px;
    width: 2.5px; height: 4px;
    background: var(--paper-warm);
    border-radius: 0 1px 1px 0;
  }
  .battery-fill {
    display: block;
    height: 100%;
    width: 80%;
    background: var(--ok-glow);
    border-radius: 1px;
    transition: width 0.3s, background 0.3s;
  }

  /* Right-side action chevron */
  .pp-action {
    flex-shrink: 0;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #b3a48a;
    padding-left: 10px;
    border-left: 1px solid rgba(255,255,255,0.1);
    margin-left: 2px;
    align-self: stretch;
    display: inline-flex;
    align-items: center;
  }
  .printer-panel:hover .pp-action { color: var(--paper-warm); }

  /* ---------- printer mouth + receipt ---------- */
  .printer-mouth {
    width: 100%;
    max-width: 360px;
    height: 12px;
    background: linear-gradient(180deg, var(--ink-2) 0%, #0e0a04 80%, #3a2f1e 100%);
    box-shadow: 0 2px 0 #0e0a04, inset 0 -2px 4px rgba(0,0,0,0.4), inset 0 2px 3px rgba(255,255,255,0.04);
    position: relative;
    margin-top: 0;
    z-index: 2;
  }
  .printer-mouth::before {
    content: "";
    position: absolute;
    left: 14px; right: 14px;
    bottom: 3px;
    height: 2px;
    background: #060300;
    border-radius: 2px;
    box-shadow: inset 0 1px 1px rgba(0,0,0,0.7);
  }

  .receipt-paper {
    width: 100%;
    max-width: 360px;
    margin-top: -2px;
    background: var(--receipt);
    padding: 20px 18px 6px;
    position: relative;
    z-index: 1;
    box-shadow:
      -4px 0 10px rgba(80,60,30,0.07),
      4px 0 10px rgba(80,60,30,0.07),
      0 14px 26px rgba(80,60,30,0.18);
    flex: 1;
    min-height: 180px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .receipt-paper::before {
    content: "";
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='p'><feTurbulence type='fractalNoise' baseFrequency='1.6' numOctaves='1' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.5  0 0 0 0 0.4  0 0 0 0.25 0'/></filter><rect width='100%25' height='100%25' filter='url(%23p)'/></svg>");
    opacity: 0.5;
    mix-blend-mode: multiply;
    pointer-events: none;
  }
  .receipt-content {
    position: relative;
    z-index: 1;
    color: #1a1a16;
    text-rendering: geometricPrecision;
  }
  .receipt-body {
    padding: 0;
    word-wrap: break-word;
    word-break: break-word;
    overflow-wrap: anywhere;
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .receipt-body.empty {
    color: #aaa190;
    font-style: italic;
    text-align: center;
    padding: 22px 18px;
    font-size: 13px;
    letter-spacing: 0.04em;
    font-family: var(--font-mono);
  }
  .receipt-render {
    display: block;
    width: 100%;
    height: auto;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
  }
  .receipt-img {
    display: block;
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
    filter: grayscale(1) contrast(1.55) brightness(1.02);
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
  }
  .receipt-qr {
    display: block;
    margin: 10px auto;
    width: 180px;
    height: 180px;
    image-rendering: pixelated;
  }

  .receipt-tear {
    width: 100%;
    max-width: 360px;
    height: 12px;
    display: block;
    filter: drop-shadow(0 6px 6px rgba(80,60,30,0.15));
  }

  /* ---------- footer: slim single line ---------- */
  .foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding-top: 10px;
    border-top: 1px solid var(--rule);
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
  }
  .foot-privacy {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--ink-soft);
    text-transform: none;
    letter-spacing: 0;
    font-family: var(--font-sans);
    font-size: 12px;
    flex: 1;
    min-width: 0;
  }
  .foot-privacy .lock-icon {
    flex-shrink: 0;
    color: var(--ok);
  }
  .foot-privacy span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .foot-right {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .foot-right a {
    color: var(--ink-soft);
    text-decoration: none;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 1px;
    transition: color 0.12s, border-color 0.12s;
    white-space: nowrap;
  }
  .foot-right a:hover {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }

  /* printing animation */
  @keyframes feedup {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
  }
  .receipt-paper.printing { animation: feedup 0.5s ease-in-out 2; }

  /* ---------- BT warning banner ---------- */
  .warning {
    background: #fbedce;
    border: 1px solid #d9be7b;
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.4;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .warning .badge {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--ink);
    color: var(--paper-warm);
    padding: 3px 7px;
    border-radius: 3px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .hide { display: none !important; }

  /* ---------- responsive ---------- */
  /* Below 880px: switch to single column, receipt on top */
  @media (max-width: 880px) {
    .frame {
      padding: 16px 16px 12px;
      min-height: 0;
      gap: 16px;
    }
    .layout {
      grid-template-columns: 1fr;
      gap: 20px;
      flex: 0 0 auto;
    }
    .receipt-col {
      order: -1;
    }
    .receipt-paper {
      flex: 0 0 auto;
      min-height: 180px;
      max-height: 320px;
    }
    .text-input {
      flex: 0 0 auto;
      min-height: 120px;
    }
    .foot {
      flex-wrap: wrap;
    }
    .foot-privacy { font-size: 11.5px; }
    .head { padding-bottom: 8px; }
    .brand { font-size: 28px; }
  }

  /* Very narrow */
  @media (max-width: 480px) {
    .pp-action { padding-left: 8px; }
    .pp-name { font-size: 11.5px; }
    .pp-meta { font-size: 9.5px; }
    .settings-row > .field { min-width: 100px; }
  }

  /* Short viewport: be even tighter */
  @media (min-width: 881px) and (max-height: 720px) {
    .frame { padding: 14px 24px 10px; gap: 10px; }
    .head { padding-bottom: 8px; }
    .brand { font-size: 26px; }
    .layout { gap: 36px; }
    .controls { gap: 12px; }
    .panel { gap: 10px; }
    .text-input { min-height: 110px; }
    .print-btn { padding: 13px 24px; font-size: 14px; }
    .settings { padding-top: 10px; }
    .receipt-paper { padding: 16px 16px 4px; }
  }
</style>
</head>
<body>
<div class="frame">

  <header class="head">
    <div class="brand">termo<span class="dotaccent"></span></div>
  </header>

  <div class="warning hide" id="warning">
    <span class="badge">Heads up</span>
    <span>This browser doesn't support Web Bluetooth. Open <strong>termo.ink</strong> in Chrome on Android or desktop to use it.</span>
  </div>

  <main class="layout">
    <!-- LEFT: controls -->
    <section class="controls">
      <div class="tabs" role="tablist">
        <button data-tab="text" class="active" type="button">Text</button>
        <button data-tab="image" type="button">Image</button>
        <button data-tab="qr" type="button">QR</button>
      </div>

      <!-- TEXT panel -->
      <div class="panel" id="panel-text">
        <div class="row">
          <div class="field">
            <label class="field-label" for="fontFamily">Font</label>
            <select id="fontFamily">
              <option value="mono" selected>Mono</option>
              <option value="sans">Sans</option>
              <option value="serif">Serif</option>
              <option value="display">Display</option>
              <option value="hand">Handwritten</option>
              <option value="typewriter">Typewriter</option>
              <option value="pixel">Pixel</option>
              <option value="terminal">Terminal</option>
              <option value="script">Script</option>
              <option value="chunky">Chunky</option>
              <option value="retro">Retro Pixel</option>
            </select>
          </div>
          <div class="field">
            <label class="field-label" for="fontSize">Size</label>
            <select id="fontSize">
              <option value="24">Small</option>
              <option value="32" selected>Medium</option>
              <option value="44">Large</option>
              <option value="64">Extra Large</option>
            </select>
          </div>
        </div>
        <div class="field" style="flex: 1; min-height: 0;">
          <div class="text-editor-head">
            <span class="field-label">Text to print</span>
            <div class="text-toolbar" role="toolbar">
              <button type="button" class="tb-btn" data-cmd="bold" title="Bold (⌘B / Ctrl+B)" aria-label="Bold"><b>B</b></button>
              <button type="button" class="tb-btn" data-cmd="italic" title="Italic (⌘I / Ctrl+I)" aria-label="Italic"><i>I</i></button>
              <button type="button" class="tb-btn" data-cmd="underline" title="Underline (⌘U / Ctrl+U)" aria-label="Underline"><u>U</u></button>
              <span class="tb-sep"></span>
              <button type="button" class="tb-btn" data-align="start" title="Align left" aria-label="Align left">
                <svg viewBox="0 0 16 16" width="13" height="13"><path d="M1 3h14M1 7h10M1 11h12M1 15h8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
              </button>
              <button type="button" class="tb-btn" data-align="center" title="Align center" aria-label="Align center">
                <svg viewBox="0 0 16 16" width="13" height="13"><path d="M1 3h14M3 7h10M2 11h12M4 15h8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
              </button>
              <button type="button" class="tb-btn" data-align="end" title="Align right" aria-label="Align right">
                <svg viewBox="0 0 16 16" width="13" height="13"><path d="M1 3h14M5 7h10M3 11h12M7 15h8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
              </button>
            </div>
          </div>
          <div id="txt" class="text-input" contenteditable="true" role="textbox" aria-multiline="true" data-placeholder="What to print?"></div>
        </div>
        <button class="print-btn" id="print-text" disabled type="button">
          PRINT
          <span class="arrow">↓</span>
        </button>
      </div>

      <!-- IMAGE panel -->
      <div class="panel hide" id="panel-image">
        <div class="field">
          <label class="field-label">Image</label>
          <label class="dropzone" id="dropzone">
            <div class="dropzone-icon">⌗</div>
            <div class="dropzone-text">Choose or drop an image</div>
            <div class="dropzone-hint">PNG · JPG · WEBP · GIF</div>
            <div class="filename hide" id="filename"></div>
            <input type="file" id="imgFile" accept="image/*">
          </label>
        </div>
        <div class="field">
          <label class="field-label" for="dither">
            Black &amp; white conversion
            <button class="hint" type="button" aria-label="What is this?" data-tooltip="Thermal printers can only print pure black or white — no greys. This option picks how colors get converted to dots: Floyd–Steinberg looks best for photos, Threshold is best for sharp logos.">?</button>
          </label>
          <select id="dither">
            <option value="floyd-steinberg" selected>Floyd–Steinberg (photos)</option>
            <option value="bayer">Bayer (uniform)</option>
            <option value="dot">Dotted</option>
            <option value="threshold">Threshold (logos)</option>
            <option value="none">None</option>
          </select>
        </div>
        <div style="flex: 1; min-height: 0;"></div>
        <button class="print-btn" id="print-image" disabled type="button">
          PRINT IMAGE
          <span class="arrow">↓</span>
        </button>
      </div>

      <!-- QR panel -->
      <div class="panel hide" id="panel-qr">
        <div class="field">
          <label class="field-label" for="qrText">Text or link</label>
          <input type="text" id="qrText" placeholder="https://… or any text">
        </div>
        <div style="flex: 1; min-height: 0;"></div>
        <button class="print-btn" id="print-qr" disabled type="button">
          PRINT QR
          <span class="arrow">↓</span>
        </button>
      </div>

      <!-- SETTINGS compact row -->
      <div class="settings">
        <div class="settings-row">
          <div class="field grow">
            <div class="slider-head">
              <span class="label">
                Print density
                <button class="hint" type="button" aria-label="What is print density?" data-tooltip="How dark the print comes out. Higher = darker text and richer blacks, but slower printing and more battery use. Bump it up for blurry receipts or thick paper.">?</button>
              </span>
              <span class="value" id="energy-val">Normal</span>
            </div>
            <input type="range" id="energy" min="8000" max="56000" step="4000" value="24000">
          </div>
          <div class="field">
            <label class="field-label">
              Orientation
              <button class="hint" type="button" aria-label="What is orientation?" data-tooltip="Portrait prints normally, across the paper. Landscape rotates the content 90° so it prints along the roll.">?</button>
            </label>
            <div class="seg" id="orient-seg" role="tablist">
              <button type="button" data-orient="portrait" class="active">Portrait</button>
              <button type="button" data-orient="landscape">Landscape</button>

    <!-- RIGHT: printer + receipt -->
    <aside class="receipt-col">
      <!-- The printer-panel IS the connect/disconnect control, themed as the printer's control display. -->
      <button class="printer-panel" id="printer-panel" type="button" aria-label="Connect printer">
        <span class="pp-led" aria-hidden="true"></span>
        <span class="pp-text">
          <span class="pp-name" id="pp-name">No printer</span>
          <span class="pp-meta" id="pp-meta">Tap to connect over Bluetooth</span>
        </span>
        <span class="pp-battery hide" id="pp-battery">
          <span class="battery"><span class="battery-fill" id="pp-bat-fill"></span></span>
          <span id="pp-pct">—</span>
        </span>
        <span class="pp-action" id="pp-action">Connect ↗</span>
      </button>
      <div class="printer-mouth"></div>
      <div class="receipt-paper" id="receipt">
        <div class="receipt-content">
          <div class="receipt-body empty" id="receipt-body">
            <span>Type something to see it here</span>
          </div>
        </div>
      </div>
      <svg class="receipt-tear" viewBox="0 0 360 12" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0 L0 4 L9 0 L18 4 L27 0 L36 4 L45 0 L54 4 L63 0 L72 4 L81 0 L90 4 L99 0 L108 4 L117 0 L126 4 L135 0 L144 4 L153 0 L162 4 L171 0 L180 4 L189 0 L198 4 L207 0 L216 4 L225 0 L234 4 L243 0 L252 4 L261 0 L270 4 L279 0 L288 4 L297 0 L306 4 L315 0 L324 4 L333 0 L342 4 L351 0 L360 4 L360 0 Z" fill="#fdfaf2"/>
      </svg>
    </aside>
  </main>

  <footer class="foot">
    <div class="foot-privacy">
      <svg class="lock-icon" viewBox="0 0 16 20" width="11" height="14" aria-hidden="true">
        <path d="M3 9h10v9.5H3z" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
        <path d="M5.5 9V5.5a2.5 2.5 0 015 0V9" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
        <circle cx="8" cy="13.5" r="1.1" fill="currentColor"/>
      </svg>
      <span>Runs entirely in your browser — text and images never leave your device.</span>
    </div>
    <div class="foot-right">
      <span>termo · v1</span>
      <a href="https://github.com" target="_blank" rel="noopener">Source</a>
    </div>
  </footer>
</div>

<div class="toast" id="toast" role="status" aria-live="polite">
  <span class="toast-icon" aria-hidden="true"></span>
  <span class="toast-text" id="toast-text"></span>
</div>

<script type="module">
  import { CatPrinter } from 'https://cdn.jsdelivr.net/npm/@opuu/cat-printer@0.1.0/+esm';
  import QRCode from 'https://cdn.jsdelivr.net/npm/qrcode@1.5.4/+esm';

  /* ---------- font registry ---------- */
  const FONTS = {
    mono: '"JetBrains Mono", ui-monospace, monospace',
    sans: '"Geist", system-ui, sans-serif',
    serif: '"Newsreader", Georgia, serif',
    display: '"Bricolage Grotesque", "Geist", system-ui, sans-serif',
    hand: '"Caveat", "Comic Sans MS", cursive',
    typewriter: '"Special Elite", "Courier New", monospace',
    pixel: '"Press Start 2P", "JetBrains Mono", monospace',
    terminal: '"VT323", ui-monospace, monospace',
    script: '"Pacifico", "Caveat", cursive',
    chunky: '"Bungee", "Bricolage Grotesque", sans-serif',
    retro: '"Silkscreen", "Press Start 2P", monospace'
  };

  /* ---------- DOM helpers ---------- */
  const $ = id => document.getElementById(id);

  /* ---------- state ---------- */
  const printer = new CatPrinter({ debug: false });
  let connected = false;
  let connecting = false;
  let imageDataUrl = null;
  let qrDataUrl = null;
  let currentTab = "text";
  let batteryPct = null;
  let pollTimer = null;

  /* ---------- BLE UUIDs (same as SDK) ---------- */
  const ADV_SVC = 0xAF30;
  const PRINT_SVC = 0xAE30;
  const TX_CHAR = 0xAE01;
  const RX_CHAR = 0xAE02;

  /* ============================================================
     TOAST — transient feedback
     ============================================================ */
  let toastTimer = null;
  const TOAST_LIFE = { ok: 3200, err: 5500, info: 4000 };
  function toast(msg, kind = "") {
    const el = $("toast");
    $("toast-text").textContent = msg;
    el.className = "toast show" + (kind ? " " + kind : "");
    clearTimeout(toastTimer);
    const life = TOAST_LIFE[kind] || TOAST_LIFE.info;
    toastTimer = setTimeout(() => el.classList.remove("show"), life);
  }
  $("toast").addEventListener("click", () => $("toast").classList.remove("show"));

  /* ============================================================
     PRINTER PANEL (connect/disconnect + status)
     This single control replaces the old Connect button + device card.
     ============================================================ */
  const panel = $("printer-panel");
  function setPanel({ state, name, meta, action, battery }) {
    panel.classList.remove("ok", "busy", "err", "warn");
    if (state) panel.classList.add(state);
    if (name !== undefined) $("pp-name").textContent = name;
    if (meta !== undefined) $("pp-meta").textContent = meta;
    if (action !== undefined) $("pp-action").textContent = action;
    if (battery !== undefined) {
      const wrap = $("pp-battery");
      if (battery == null) {
        wrap.classList.add("hide");
      } else {
        wrap.classList.remove("hide");
        $("pp-pct").textContent = battery + "%";
        const fill = $("pp-bat-fill");
        fill.style.width = Math.max(8, Math.min(100, battery)) + "%";
        fill.style.background = battery <= 15 ? "#e0734a" : battery <= 40 ? "#d99836" : "#7fa84e";
      }
    }
  }

  function panelDisconnected() {
    setPanel({ state: null, name: "No printer", meta: "Tap to connect over Bluetooth", action: "Connect ↗", battery: null });
  }
  function panelConnecting() {
    setPanel({ state: "busy", name: "Scanning…", meta: "Pick your MX10 in the dialog", action: "Cancel" });
  }
  function panelConnected() {
    const name = printer.device?.name || printer.modelName || "MX10";
    const st = printer.printerState || {};
    let metaState = "warn";
    let metaText = "Ready to print";
    if (st.outOfPaper) { metaState = "err"; metaText = "Out of paper"; }
    else if (st.coverOpen) { metaState = "err"; metaText = "Cover open"; }
    else if (st.overheat) { metaState = "warn"; metaText = "Overheating — let it cool"; }
    else if (st.busy) { metaState = "busy"; metaText = "Printing…"; }
    else if (st.lowPower || (batteryPct != null && batteryPct <= 15)) { metaState = "warn"; metaText = "Battery low — charge soon"; }
    else { metaState = "ok"; metaText = "Ready to print"; }
    setPanel({
      state: metaState,
      name,
      meta: metaText,
      action: "Disconnect",
      battery: batteryPct
    });
  }

  // single click handler — does the right thing for the current state
  panel.addEventListener("click", onPanelClick);
  async function onPanelClick() {
    if (!navigator.bluetooth) { toast("Web Bluetooth not available in this browser.", "err"); return; }
    if (connecting) return; // ignore mid-scan clicks
    if (connected) {
      try { await printer.disconnect?.(); } catch {}
      onDisconnected();
      return;
    }
    connecting = true;
    panelConnecting();
    try {
      await requestAndAttach();
      onConnected();
    } catch (e) {
      onDisconnected();
      const msg = (e?.message || e || "").toString();
      if (!/cancel|chooser|user/i.test(msg)) toast("Couldn't connect: " + msg, "err");
    } finally {
      connecting = false;
    }
  }

  /* ============================================================
     BLE connection (mirrors the SDK's connect so we control it)
     ============================================================ */
  async function attach(device) {
    printer.device = device;
    printer.modelName = device.name || "";
    const server = await device.gatt.connect();
    printer.server = server;
    const svc = await server.getPrimaryService(PRINT_SVC);
    printer.txCharacteristic = await svc.getCharacteristic(TX_CHAR);
    printer.rxCharacteristic = await svc.getCharacteristic(RX_CHAR);
    await printer.rxCharacteristic.startNotifications();
    printer.rxCharacteristic.addEventListener("characteristicvaluechanged", printer.handleNotification.bind(printer));
    device.addEventListener("gattserverdisconnected", onGattDisconnected, { once: true });
    await printer.getDeviceState();
    await new Promise(r => setTimeout(r, 200));
    await printer.prepare(printer.options.speed ?? 32, +$("energy").value);
    await readBattery();
  }

  async function requestAndAttach() {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [ADV_SVC] }],
      optionalServices: [PRINT_SVC, "battery_service", "device_information"]
    });
    await attach(device);
  }

  async function readBattery() {
    try {
      const svc = await printer.server.getPrimaryService("battery_service");
      const ch = await svc.getCharacteristic("battery_level");
      const v = await ch.readValue();
      batteryPct = v.getUint8(0);
    } catch {
      batteryPct = null;
    }
  }

  function onConnected() {
    connected = true;
    setPrintEnabled();
    panelConnected();
    startPolling();
    toast("Connected to " + (printer.device?.name || "printer"), "ok");
  }
  function onDisconnected() {
    connected = false;
    batteryPct = null;
    stopPolling();
    setPrintEnabled();
    panelDisconnected();
  }
  function onGattDisconnected() {
    if (connected) {
      onDisconnected();
      toast("Printer disconnected — connection lost", "err");
    }
  }
  function startPolling() {
    stopPolling();
    pollTimer = setInterval(async () => {
      if (!connected || !printer.isConnected()) return;
      try {
        await printer.getDeviceState();
        await new Promise(r => setTimeout(r, 200));
        await readBattery();
        panelConnected();
      } catch {}
    }, 20000);
  }
  function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

  /* ---------- BT availability ---------- */
  if (!navigator.bluetooth) {
    $("warning").classList.remove("hide");
    panel.setAttribute("disabled", "true");
    panel.style.opacity = 0.55;
    panel.style.cursor = "not-allowed";
    setPanel({ state: null, name: "Bluetooth unavailable", meta: "Open in Chrome to print", action: "" });
  }

  function setPrintEnabled() {
    $("print-text").disabled = !connected;
    $("print-image").disabled = !connected || !imageDataUrl;
    $("print-qr").disabled = !connected || !qrDataUrl;
    $("feed").disabled = !connected;
  }

  /* ============================================================
     TABS
     ============================================================ */
  document.querySelectorAll(".tabs button").forEach(b => {
    b.addEventListener("click", () => {
      document.querySelectorAll(".tabs button").forEach(x => x.classList.toggle("active", x === b));
      currentTab = b.dataset.tab;
      ["text","image","qr"].forEach(t => $("panel-"+t).classList.toggle("hide", t !== currentTab));
      renderPreview();
    });
  });

  /* ============================================================
     TEXT controls (font/size + contenteditable + toolbar)
     ============================================================ */
  const txt = $("txt");
  let fontKey = "mono";
  let fontSize = 32;
  let align = "start";

  $("fontFamily").addEventListener("change", e => {
    fontKey = e.target.value;
    txt.style.fontFamily = FONTS[fontKey];
    renderPreview();
  });
  $("fontSize").addEventListener("change", e => {
    fontSize = +e.target.value;
    renderPreview();
  });
  txt.style.fontFamily = FONTS[fontKey];

  document.querySelectorAll(".tb-btn").forEach(b => {
    b.addEventListener("mousedown", e => e.preventDefault());
    b.addEventListener("click", () => {
      if (b.dataset.cmd) {
        document.execCommand(b.dataset.cmd, false, null);
        txt.focus();
        updateToolbarState();
        renderPreview();
      } else if (b.dataset.align) {
        align = b.dataset.align;
        updateToolbarState();
        renderPreview();
      }
    });
  });
  function updateToolbarState() {
    document.querySelectorAll(".tb-btn[data-cmd]").forEach(b => {
      let state = false;
      try { state = document.queryCommandState(b.dataset.cmd); } catch {}
      b.classList.toggle("active", state);
    });
    document.querySelectorAll(".tb-btn[data-align]").forEach(b => {
      b.classList.toggle("active", b.dataset.align === align);
    });
  }
  txt.addEventListener("input", renderPreview);
  txt.addEventListener("keyup", updateToolbarState);
  txt.addEventListener("mouseup", updateToolbarState);
  txt.addEventListener("focus", updateToolbarState);
  txt.addEventListener("paste", e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData("text/plain");
    document.execCommand("insertText", false, text);
  });

  /* ---------- DOM → styled run list for canvas rendering ---------- */
  function getStyledLines(root) {
    const lines = [[]];
    function walk(node, ctx) {
      if (node.nodeType === Node.TEXT_NODE) {
        const text = node.textContent.replace(/\u00A0/g, " ");
        if (!text) return;
        const parts = text.split("\n");
        parts.forEach((p, i) => {
          if (i > 0) lines.push([]);
          if (p) lines[lines.length - 1].push({ text: p, ...ctx });
        });
        return;
      }
      if (node.nodeName === "BR") { lines.push([]); return; }
      const newCtx = { ...ctx };
      const nn = node.nodeName;
      if (nn === "B" || nn === "STRONG") newCtx.bold = true;
      if (nn === "I" || nn === "EM") newCtx.italic = true;
      if (nn === "U") newCtx.underline = true;
      const isBlock = nn === "DIV" || nn === "P";
      const isFirstChildOfRoot = (node.parentNode === root) && (node === root.firstChild);
      if (isBlock && !isFirstChildOfRoot && lines[lines.length - 1].length > 0) lines.push([]);
      for (const child of node.childNodes) walk(child, newCtx);
    }
    walk(root, { bold: false, italic: false, underline: false });
    while (lines.length > 1 && lines[lines.length - 1].length === 0) lines.pop();
    return lines;
  }
  function plainTextFromEditor() {
    return getStyledLines(txt).map(l => l.map(r => r.text).join("")).join("\n").trim();
  }

  /* ---------- canvas text renderer (384px wide) ---------- */
  async function renderTextToCanvas() {
    try {
      const fam = FONTS[fontKey].split(',')[0];
      await document.fonts.load(`${fontSize}px ${fam}`);
      await document.fonts.load(`bold ${fontSize}px ${fam}`);
      await document.fonts.load(`italic ${fontSize}px ${fam}`);
    } catch {}
    const W = 384;
    const PAD_X = 4;
    const inner = W - PAD_X * 2;
    const lines = getStyledLines(txt);
    if (lines.length === 0 || lines.every(l => l.length === 0)) return null;
    const tmp = document.createElement("canvas");
    const ctx = tmp.getContext("2d");
    const fontStack = FONTS[fontKey];
    const setFont = run => {
      const parts = [];
      if (run.italic) parts.push("italic");
      if (run.bold) parts.push("bold");
      parts.push(`${fontSize}px`);
      parts.push(fontStack);
      ctx.font = parts.join(" ");
    };
    const wrapped = [];
    for (const inputLine of lines) {
      if (inputLine.length === 0) { wrapped.push([]); continue; }
      let cur = [];
      let curW = 0;
      const pushLine = () => { wrapped.push(cur); cur = []; curW = 0; };
      const tokens = [];
      for (const run of inputLine) {
        const re = /(\s+|\S+)/g;
        let m;
        while ((m = re.exec(run.text)) !== null) tokens.push({ ...run, text: m[0] });
      }
      for (const tok of tokens) {
        setFont(tok);
        const w = ctx.measureText(tok.text).width;
        if (curW + w > inner && cur.length > 0) {
          pushLine();
          if (/^\s+$/.test(tok.text)) continue;
        }
        if (w > inner && !(/^\s+$/.test(tok.text))) {
          let chunk = "";
          let chunkW = 0;
          for (const ch of tok.text) {
            const cw = ctx.measureText(ch).width;
            if (chunkW + cw > inner && chunk) {
              cur.push({ ...tok, text: chunk });
              pushLine();
              chunk = ch; chunkW = cw;
            } else {
              chunk += ch; chunkW += cw;
            }
          }
          if (chunk) { cur.push({ ...tok, text: chunk }); curW = chunkW; }
        } else {
          cur.push(tok);
          curW += w;
        }
      }
      pushLine();
    }
    while (wrapped.length > 1 && wrapped[wrapped.length - 1].length === 0) wrapped.pop();
    if (wrapped.length === 0) return null;
    const lineHeight = Math.round(fontSize * 1.32);
    const topPad = Math.round(fontSize * 0.25);
    const botPad = Math.round(fontSize * 0.25);
    const H = topPad + wrapped.length * lineHeight + botPad;
    tmp.width = W; tmp.height = H;
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#000"; ctx.textBaseline = "alphabetic";
    wrapped.forEach((line, idx) => {
      let lineWidth = 0;
      for (const run of line) { setFont(run); lineWidth += ctx.measureText(run.text).width; }
      let x = PAD_X;
      if (align === "center") x = (W - lineWidth) / 2;
      if (align === "end") x = W - PAD_X - lineWidth;
      const baseline = topPad + idx * lineHeight + Math.round(fontSize * 0.95);
      for (const run of line) {
        setFont(run);
        ctx.fillText(run.text, x, baseline);
        const w = ctx.measureText(run.text).width;
        if (run.underline) {
          const uy = baseline + Math.round(fontSize * 0.12);
          const uh = Math.max(1, Math.round(fontSize / 18));
          ctx.fillRect(x, uy, w, uh);
        }
        x += w;
      }
    });
    return tmp;
  }

  /* ============================================================
     IMAGE controls
     ============================================================ */
  $("imgFile").addEventListener("change", e => loadImage(e.target.files[0]));
  const dz = $("dropzone");
  ["dragenter","dragover"].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add("dragover"); }));
  ["dragleave","drop"].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove("dragover"); }));
  dz.addEventListener("drop", e => {
    const f = e.dataTransfer.files?.[0];
    if (f && f.type.startsWith("image/")) loadImage(f);
  });
  function loadImage(f) {
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      imageDataUrl = r.result;
      $("filename").textContent = f.name;
      $("filename").classList.remove("hide");
      setPrintEnabled();
      renderPreview();
    };
    r.readAsDataURL(f);
  }
  $("dither").addEventListener("change", renderPreview);

  /* ============================================================
     QR controls
     ============================================================ */
  const qrInput = $("qrText");
  let qrDebounce = null;
  qrInput.addEventListener("input", () => { clearTimeout(qrDebounce); qrDebounce = setTimeout(updateQR, 180); });
  async function updateQR() {
    const v = qrInput.value.trim();
    if (!v) { qrDataUrl = null; setPrintEnabled(); renderPreview(); return; }
    try {
      qrDataUrl = await QRCode.toDataURL(v, { margin: 2, width: 384, errorCorrectionLevel: 'M', color: { dark: "#000", light: "#fff" } });
      setPrintEnabled();
      renderPreview();
    } catch {}
  }

  /* ============================================================
     SETTINGS (density + orientation + feed)
     ============================================================ */
  const energy = $("energy");
  function updateEnergyLabel() {
    const v = +energy.value;
    const labels = ["lower", "normal", "higher", "max"];
    const idx = v < 16000 ? 0 : v < 28000 ? 1 : v < 44000 ? 2 : 3;
    $("energy-val").textContent = labels[idx];
  }
  energy.addEventListener("input", updateEnergyLabel);
  updateEnergyLabel();

  let orientation = "portrait";
  document.querySelectorAll("#orient-seg button").forEach(b => {
    b.addEventListener("click", () => {
      orientation = b.dataset.orient;
      document.querySelectorAll("#orient-seg button").forEach(x => x.classList.toggle("active", x === b));
      renderPreview();
    });
  });
  function rotate90(srcUrl) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement("canvas");
        c.width = img.height; c.height = img.width;
        const cx = c.getContext("2d");
        cx.fillStyle = "#fff"; cx.fillRect(0, 0, c.width, c.height);
        cx.translate(c.width / 2, c.height / 2);
        cx.rotate(Math.PI / 2);
        cx.drawImage(img, -img.width / 2, -img.height / 2);
        resolve(c.toDataURL("image/png"));
      };
      img.onerror = () => resolve(srcUrl);
      img.src = srcUrl;
    });
  }
  async function orient(srcUrl) {
    return orientation === "landscape" ? await rotate90(srcUrl) : srcUrl;
  }

  /* ============================================================
     PRINT (paced bitmap writes, see comment block in source)
     ============================================================ */
  const CMD_BITMAP = 162;
  const END_FEED = 40;
  const FALLBACK_ROW_DELAY = 10;
  let txWithResponse = null;
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function sendRow(rowBytes) {
    const ch = printer.txCharacteristic;
    const pkt = printer.makeCommand(CMD_BITMAP, rowBytes);
    if (txWithResponse === null) txWithResponse = !!(ch.properties && ch.properties.write);
    if (txWithResponse) {
      await ch.writeValueWithResponse(pkt);
    } else {
      await ch.writeValueWithoutResponse(pkt);
      await sleep(FALLBACK_ROW_DELAY);
    }
  }
  async function printPaced(dataUrl, dither, rotate = 0) {
    const opts = { dither, rotate, flipH: false, flipV: false, brightness: 128, offset: 0 };
    const bmp = await printer.imageToBitmap(dataUrl, opts);
    await printer.prepare(printer.options.speed ?? 32, +energy.value);
    const bpr = Math.ceil(bmp.width / 8);
    for (let y = 0; y < bmp.height; y++) {
      await sendRow(bmp.data.slice(y * bpr, y * bpr + bpr));
    }
    await printer.finish(END_FEED);
  }

  async function safePrint(fn, okMsg = "Printed") {
    if (!connected) { toast("Connect a printer first.", "err"); return; }
    const beforeDisabled = ["print-text","print-image","print-qr","feed"].map(id => [id, $(id).disabled]);
    ["print-text","print-image","print-qr","feed"].forEach(id => $(id).disabled = true);
    $("receipt").classList.add("printing");
    try {
      printer.options.energy = +energy.value;
      await fn();
      toast(okMsg, "ok");
    } catch (e) {
      toast("Couldn't print: " + (e?.message || e), "err");
    } finally {
      $("receipt").classList.remove("printing");
      beforeDisabled.forEach(([id, d]) => $(id).disabled = d);
      setPrintEnabled();
    }
  }

  $("print-text").addEventListener("click", async () => {
    const plain = plainTextFromEditor();
    if (!plain) { toast("Text is empty.", "err"); return; }
    const canvas = await renderTextToCanvas();
    if (!canvas) { toast("Text is empty.", "err"); return; }
    const dataUrl = await orient(canvas.toDataURL("image/png"));
    safePrint(() => printPaced(dataUrl, "threshold"));
  });
  $("print-image").addEventListener("click", async () => {
    if (!imageDataUrl) { toast("Choose an image first.", "err"); return; }
    const dataUrl = await orient(imageDataUrl);
    safePrint(() => printPaced(dataUrl, $("dither").value));
  });
  $("print-qr").addEventListener("click", () => {
    if (!qrDataUrl) { toast("Enter some text for the QR code.", "err"); return; }
    safePrint(() => printPaced(qrDataUrl, "threshold"));
  });
  $("feed").addEventListener("click", () => safePrint(() => printer.feed(80), "Paper fed"));

  /* ============================================================
     LIVE PREVIEW
     ============================================================ */
  let previewSeq = 0;
  async function renderPreview() {
    const body = $("receipt-body");
    const myTurn = ++previewSeq;
    if (currentTab === "text") {
      const plain = plainTextFromEditor();
      if (!plain) {
        body.className = "receipt-body empty";
        body.innerHTML = "<span>Type something to see it here ↑</span>";
        return;
      }
      const canvas = await renderTextToCanvas();
      if (myTurn !== previewSeq) return;
      if (!canvas) {
        body.className = "receipt-body empty";
        body.innerHTML = "<span>Type something to see it here ↑</span>";
        return;
      }
      const src = await orient(canvas.toDataURL("image/png"));
      if (myTurn !== previewSeq) return;
      body.className = "receipt-body";
      body.innerHTML = "";
      const img = document.createElement("img");
      img.className = "receipt-render";
      img.src = src;
      body.appendChild(img);
    } else if (currentTab === "image") {
      if (imageDataUrl) {
        const src = await orient(imageDataUrl);
        if (myTurn !== previewSeq) return;
        body.className = "receipt-body";
        body.innerHTML = "";
        const img = document.createElement("img");
        img.className = "receipt-img";
        img.src = src;
        body.appendChild(img);
      } else {
        body.className = "receipt-body empty";
        body.innerHTML = "<span>Choose an image ↑</span>";
      }
    } else {
      body.className = "receipt-body";
      body.innerHTML = "";
      if (qrDataUrl) {
        const img = document.createElement("img");
        img.className = "receipt-qr";
        img.src = qrDataUrl;
        body.appendChild(img);
      } else {
        body.className = "receipt-body empty";
        body.innerHTML = "<span>Type a link or text ↑</span>";
      }
    }
  }

  /* ============================================================
     SERVICE WORKER
     ============================================================ */
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});

  /* ============================================================
     INIT
     ============================================================ */
  renderPreview();
  setPrintEnabled();
  panelDisconnected();
</script>
</body>
</html>
