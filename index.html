<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ede4d2">
<title>termo — print to your MX10</title>
<meta name="description" content="A free site that prints text, images, and QR codes to your MX10 (or cat-printer compatible) thermal printer straight from the browser. No accounts, no ads.">
<meta property="og:title" content="termo — print to your MX10">
<meta property="og:description" content="Print to your thermal printer from the browser. Over Bluetooth. No accounts, no ads.">

<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Geist:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@10..48,400..800&family=Caveat:wght@400..700&family=Special+Elite&family=Press+Start+2P&family=VT323&family=Pacifico&family=Bungee&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="frame">

  <header class="head">
    <div class="brand">termo<span class="dotaccent"></span></div>
  </header>

  <div class="warning hide" id="warning">
    <span class="badge">Heads up</span>
    <span>This browser doesn't support Web Bluetooth. Open <strong>termo.ink</strong> in Chrome on Android or desktop to use it.</span>
  </div>

  <main class="layout">
    <!-- LEFT: controls -->
    <section class="controls">
      <div class="tabs" role="tablist">
        <button data-tab="text" class="active" type="button">Text</button>
        <button data-tab="image" type="button">Image</button>
        <button data-tab="qr" type="button">QR</button>
      </div>

      <!-- TEXT panel -->
      <div class="panel" id="panel-text">
        <div class="row">
          <div class="field">
            <label class="field-label" for="fontFamily">Font</label>
            <select id="fontFamily">
              <option value="mono" selected>Mono</option>
              <option value="sans">Sans</option>
              <option value="serif">Serif</option>
              <option value="display">Display</option>
              <option value="hand">Handwritten</option>
              <option value="typewriter">Typewriter</option>
              <option value="pixel">Pixel</option>
              <option value="terminal">Terminal</option>
              <option value="script">Script</option>
              <option value="chunky">Chunky</option>
              <option value="retro">Retro Pixel</option>
            </select>
          </div>
          <div class="field">
            <label class="field-label" for="fontSize">Size</label>
            <select id="fontSize">
              <option value="24">Small</option>
              <option value="32" selected>Medium</option>
              <option value="44">Large</option>
              <option value="64">Extra Large</option>
            </select>
          </div>
        </div>
        <div class="field" style="flex: 1; min-height: 0;">
          <div class="text-editor-head">
            <span class="field-label">Text to print</span>
            <div class="text-toolbar" role="toolbar">
              <button type="button" class="tb-btn" data-cmd="bold" title="Bold (⌘B / Ctrl+B)" aria-label="Bold"><b>B</b></button>
              <button type="button" class="tb-btn" data-cmd="italic" title="Italic (⌘I / Ctrl+I)" aria-label="Italic"><i>I</i></button>
              <button type="button" class="tb-btn" data-cmd="underline" title="Underline (⌘U / Ctrl+U)" aria-label="Underline"><u>U</u></button>
              <span class="tb-sep"></span>
              <button type="button" class="tb-btn" data-align="start" title="Align left" aria-label="Align left">
                <svg viewBox="0 0 16 16" width="13" height="13"><path d="M1 3h14M1 7h10M1 11h12M1 15h8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
              </button>
              <button type="button" class="tb-btn" data-align="center" title="Align center" aria-label="Align center">
                <svg viewBox="0 0 16 16" width="13" height="13"><path d="M1 3h14M3 7h10M2 11h12M4 15h8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
              </button>
              <button type="button" class="tb-btn" data-align="end" title="Align right" aria-label="Align right">
                <svg viewBox="0 0 16 16" width="13" height="13"><path d="M1 3h14M5 7h10M3 11h12M7 15h8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
              </button>
            </div>
          </div>
          <div id="txt" class="text-input" contenteditable="true" role="textbox" aria-multiline="true" data-placeholder="What to print?"></div>
        </div>
        <button class="print-btn" id="print-text" disabled type="button">
          PRINT
          <span class="arrow">↓</span>
        </button>
      </div>

      <!-- IMAGE panel -->
      <div class="panel hide" id="panel-image">
        <div class="field">
          <label class="field-label">Image</label>
          <label class="dropzone" id="dropzone">
            <div class="dropzone-icon">⌗</div>
            <div class="dropzone-text">Choose or drop an image</div>
            <div class="dropzone-hint">PNG · JPG · WEBP · GIF</div>
            <div class="filename hide" id="filename"></div>
            <input type="file" id="imgFile" accept="image/*">
          </label>
        </div>
        <div class="field">
          <label class="field-label" for="dither">
            Black &amp; white conversion
            <button class="hint" type="button" aria-label="What is this?" data-tooltip="Thermal printers can only print pure black or white — no greys. This option picks how colors get converted to dots: Floyd–Steinberg looks best for photos, Threshold is best for sharp logos.">?</button>
          </label>
          <select id="dither">
            <option value="floyd-steinberg" selected>Floyd–Steinberg (photos)</option>
            <option value="bayer">Bayer (uniform)</option>
            <option value="dot">Dotted</option>
            <option value="threshold">Threshold (logos)</option>
            <option value="none">None</option>
          </select>
        </div>
        <div style="flex: 1; min-height: 0;"></div>
        <button class="print-btn" id="print-image" disabled type="button">
          PRINT IMAGE
          <span class="arrow">↓</span>
        </button>
      </div>

      <!-- QR panel -->
      <div class="panel hide" id="panel-qr">
        <div class="field">
          <label class="field-label" for="qrText">Text or link</label>
          <input type="text" id="qrText" placeholder="https://… or any text">
        </div>
        <div style="flex: 1; min-height: 0;"></div>
        <button class="print-btn" id="print-qr" disabled type="button">
          PRINT QR
          <span class="arrow">↓</span>
        </button>
      </div>

      <!-- SETTINGS compact row -->
      <div class="settings">
        <div class="settings-row">
          <div class="field grow">
            <div class="slider-head">
              <span class="label">
                Print density
                <button class="hint" type="button" aria-label="What is print density?" data-tooltip="How dark the print comes out. Higher = darker text and richer blacks, but slower printing and more battery use. Bump it up for blurry receipts or thick paper.">?</button>
              </span>
              <span class="value" id="energy-val">Normal</span>
            </div>
            <input type="range" id="energy" min="8000" max="56000" step="4000" value="24000">
          </div>
          <div class="field">
            <label class="field-label">
              Orientation
              <button class="hint" type="button" aria-label="What is orientation?" data-tooltip="Portrait prints normally, across the paper. Landscape rotates the content 90° so it prints along the roll.">?</button>
            </label>
            <div class="seg" id="orient-seg" role="tablist">
              <button type="button" data-orient="portrait" class="active">Portrait</button>
              <button type="button" data-orient="landscape">Landscape</button>
            </div>
          </div>
          <button class="sec-btn" id="feed" disabled type="button">Feed paper</button>
        </div>
      </div>
    </section>

    <!-- RIGHT: printer + receipt -->
    <aside class="receipt-col">
      <!-- The printer-panel IS the connect/disconnect control, themed as the printer's control display. -->
      <button class="printer-panel" id="printer-panel" type="button" aria-label="Connect printer">
        <span class="pp-led" aria-hidden="true"></span>
        <span class="pp-text">
          <span class="pp-name" id="pp-name">No printer</span>
          <span class="pp-meta" id="pp-meta">Tap to connect over Bluetooth</span>
        </span>
        <span class="pp-battery hide" id="pp-battery">
          <span class="battery"><span class="battery-fill" id="pp-bat-fill"></span></span>
          <span id="pp-pct">—</span>
        </span>
        <span class="pp-action" id="pp-action">Connect ↗</span>
      </button>
      <div class="printer-mouth"></div>
      <div class="receipt-paper" id="receipt">
        <div class="receipt-content">
          <div class="receipt-body empty" id="receipt-body">
            <span>Type something to see it here</span>
          </div>
        </div>
      </div>
      <svg class="receipt-tear" viewBox="0 0 360 12" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0 L0 4 L9 0 L18 4 L27 0 L36 4 L45 0 L54 4 L63 0 L72 4 L81 0 L90 4 L99 0 L108 4 L117 0 L126 4 L135 0 L144 4 L153 0 L162 4 L171 0 L180 4 L189 0 L198 4 L207 0 L216 4 L225 0 L234 4 L243 0 L252 4 L261 0 L270 4 L279 0 L288 4 L297 0 L306 4 L315 0 L324 4 L333 0 L342 4 L351 0 L360 4 L360 0 Z" fill="#fdfaf2"/>
      </svg>
    </aside>
  </main>

  <footer class="foot">
    <div class="foot-privacy">
      <svg class="lock-icon" viewBox="0 0 16 20" width="11" height="14" aria-hidden="true">
        <path d="M3 9h10v9.5H3z" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
        <path d="M5.5 9V5.5a2.5 2.5 0 015 0V9" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
        <circle cx="8" cy="13.5" r="1.1" fill="currentColor"/>
      </svg>
      <span>Runs entirely in your browser — text and images never leave your device.</span>
    </div>
    <div class="foot-right">
      <span>termo · v1</span>
      <a href="https://github.com" target="_blank" rel="noopener">Source</a>
    </div>
  </footer>
</div>

<div class="toast" id="toast" role="status" aria-live="polite">
  <span class="toast-icon" aria-hidden="true"></span>
  <span class="toast-text" id="toast-text"></span>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
